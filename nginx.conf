# ── Nginx Config for 4reels.cc ────────────────────────────
# Place at: /etc/nginx/sites-available/4reels.cc
# Enable:   sudo ln -s /etc/nginx/sites-available/4reels.cc /etc/nginx/sites-enabled/
# SSL:      sudo certbot --nginx -d 4reels.cc -d www.4reels.cc

server {
    listen 80;
    server_name 4reels.cc www.4reels.cc;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name 4reels.cc www.4reels.cc;

    # SSL — issued by Let's Encrypt via certbot
    ssl_certificate     /etc/letsencrypt/live/4reels.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/4reels.cc/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied    expired no-cache no-store private auth;
    gzip_types      text/plain text/css text/xml text/javascript
                    application/javascript application/json application/xml;

    # Static files served directly by nginx (fast)
    root /var/www/4reels/public;

    location ~* \.(css|js|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri @proxy;
    }

    # Everything else → Node.js
    location / {
        try_files $uri @proxy;
    }

    location @proxy {
        proxy_pass            http://127.0.0.1:3000;
        proxy_http_version    1.1;
        proxy_set_header      Upgrade $http_upgrade;
        proxy_set_header      Connection 'upgrade';
        proxy_set_header      Host $host;
        proxy_set_header      X-Real-IP $remote_addr;
        proxy_set_header      X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_cache_bypass    $http_upgrade;
        proxy_read_timeout    30s;
        proxy_connect_timeout 5s;

    }

    # Block dotfiles
    location ~ /\. { deny all; }
}
