<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>4reels.cc — In Development</title>
  <meta name="robots" content="noindex,nofollow"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="icon" type="image/svg+xml" href="/4reels-icon.svg"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      font-family:'DM Sans',system-ui,sans-serif;
      background:#0b0c10;
      color:#f0f0f5;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100%;
      padding:24px;
      -webkit-font-smoothing:antialiased;
    }
    .wrap{
      text-align:center;
      max-width:420px;
    }
    .logo{
      width:64px;
      height:64px;
      margin:0 auto 28px;
      opacity:.95;
    }
    h1{
      font-family:'Space Grotesk',system-ui,sans-serif;
      font-size:clamp(1.75rem,5vw,2.25rem);
      font-weight:700;
      letter-spacing:-.02em;
      line-height:1.2;
      margin-bottom:12px;
    }
    .domain{color:#3b82f6}
    p{
      font-size:1.05rem;
      color:#8b8d9a;
      line-height:1.5;
    }
    .badge{
      display:inline-block;
      margin-top:28px;
      padding:8px 16px;
      border-radius:999px;
      font-size:.8rem;
      font-weight:500;
      letter-spacing:.04em;
      text-transform:uppercase;
      color:#3b82f6;
      background:rgba(59,130,246,.1);
      border:1px solid rgba(59,130,246,.25);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img class="logo" src="/4reels-icon.svg" alt=""/>
    <h1><span class="domain">4reels.cc</span> in development</h1>
    <p>We're building something new. Check back soon.</p>
    <span class="badge">Coming soon</span>
  </div>
</body>
</html>
